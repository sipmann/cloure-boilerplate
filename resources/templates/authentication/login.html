{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto bg-white rounded shadow p-6">

    <h1 class="text-2xl font-bold mb-6">
        Login
    </h1>

    <form method="post">
        {% csrf-field %}
        <div class="mb-4">
            <label>Email</label>
            <input
                    class="w-full border rounded p-2"
                    type="email"
                    name="email">
        </div>

        <div class="mb-6">
            <label>Senha</label>
            <input
                    class="w-full border rounded p-2"
                    type="password"
                    name="password">
        </div>

        <button
                class="bg-indigo-600 text-white rounded px-4 py-2 w-full">
            Entrar
        </button>
    </form>
</div>

{% endblock %}
